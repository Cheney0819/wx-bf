name: 构建桌宠 Windows 安装包

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 读取桌宠版本
        id: app_version
        shell: pwsh
        run: |
          [xml]$project = Get-Content "windows-pet-wpf\DesktopPet.Wpf.csproj"
          $version = [string]($project.Project.PropertyGroup.Version | Select-Object -First 1)
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "未在 DesktopPet.Wpf.csproj 中读取到版本号"
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: 安装 FFmpeg
        shell: pwsh
        run: choco install ffmpeg -y --no-progress

      - name: 构建桌宠主体
        shell: pwsh
        run: .\build.ps1

      - name: 安装 Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: 构建中文安装包
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "windows-pet-wpf\DesktopPetSetup.iss"

      - name: 整理发布产物
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "windows-pet-wpf\installer-output\桌宠-安装包.exe" "release\桌宠-$env:APP_VERSION-安装包.exe" -Force

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 桌宠-${{ steps.app_version.outputs.version }}
          path: release\*
